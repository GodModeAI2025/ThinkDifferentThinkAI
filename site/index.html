<!doctype html>
<html lang="de">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Think Different. Think AI. Transkripte</title>
    <meta name="description" content="Auswahl und Suche in den Transkripten des Podcasts Think Different. Think AI.">
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <header class="topbar">
      <a class="brand" href="./" aria-label="Startseite">
        <img src="https://images.podigee-cdn.net/0x,sL3rd-8gIENV0jDGxTRhEKOYzoUhn4Sgs9-d3rsTM_Hk=/https://main.podigee-cdn.net/uploads/u73317/3c6e6a97-b38f-40cb-8890-7ce7916cb31c.jpg" alt="">
        <span>Think Different. Think AI.</span>
      </a>
      <nav class="topnav" aria-label="Weitere Links">
        <a class="header-link" href="https://think-ai.podigee.io/" target="_blank" rel="noreferrer">Podcast</a>
        <a class="header-link" href="https://godmodeai2025.github.io/MarkZimmermann/" target="_blank" rel="noreferrer">Impressum</a>
      </nav>
    </header>

    <main class="layout">
      <aside class="sidebar" aria-label="Folgen">
        <div class="cover-card">
          <img src="https://images.podigee-cdn.net/0x,sL3rd-8gIENV0jDGxTRhEKOYzoUhn4Sgs9-d3rsTM_Hk=/https://main.podigee-cdn.net/uploads/u73317/3c6e6a97-b38f-40cb-8890-7ce7916cb31c.jpg" alt="">
          <div>
            <p>Transkriptarchiv</p>
            <strong>Think Different. Think AI.</strong>
          </div>
        </div>
        <section class="about-us" aria-labelledby="aboutTitle">
          <h2 id="aboutTitle">About us</h2>
          <div class="host-links">
            <a href="https://www.linkedin.com/in/mark-zimmermann-5a005123/" target="_blank" rel="noreferrer">Mark Zimmermann</a>
            <a href="https://www.linkedin.com/in/scharnetzki/" target="_blank" rel="noreferrer">Jens Scharnetzki</a>
          </div>
          <details class="feedback-panel">
            <summary>Feedback</summary>
            <form class="feedback-form" id="feedbackForm" action="mailto:charta.ei.4z@icloud.com?subject=PODCAST%20FEEDBACK" method="post" enctype="text/plain">
              <label for="feedbackTitle">Titel</label>
              <input id="feedbackTitle" name="Titel" type="text" autocomplete="off" required>
              <label for="feedbackMessage">Nachricht</label>
              <textarea id="feedbackMessage" name="Nachricht" rows="4" required></textarea>
              <button type="submit">Feedback senden</button>
            </form>
          </details>
        </section>
        <div class="search-row">
          <label for="search">Transkript auswählen</label>
          <input id="search" type="search" autocomplete="off" placeholder="Folge suchen">
        </div>
        <div class="meta-line" id="summary">Lade Folgen...</div>
        <div class="episode-list" id="episodeList"></div>
      </aside>

      <section class="reader" aria-live="polite">
        <div class="reader-header">
          <div class="episode-heading">
            <p class="eyebrow" id="episodeMeta"></p>
            <h1 id="episodeTitle">Transkripte</h1>
          </div>
          <img class="selected-cover" id="selectedCover" src="https://images.podigee-cdn.net/0x,sL3rd-8gIENV0jDGxTRhEKOYzoUhn4Sgs9-d3rsTM_Hk=/https://main.podigee-cdn.net/uploads/u73317/3c6e6a97-b38f-40cb-8890-7ce7916cb31c.jpg" alt="">
          <div class="actions">
            <div class="language-switch" role="group" aria-label="Transkriptsprache">
              <button type="button" class="active" data-language="de" id="languageDe">Deutsch</button>
              <button type="button" data-language="en" id="languageEn">English</button>
            </div>
            <a class="button" id="transcriptLink" href="#" target="_blank" rel="noreferrer">Markdown</a>
            <a class="button primary" id="playerLink" href="https://think-ai.podigee.io/" target="_blank" rel="noreferrer">Webplayer</a>
          </div>
        </div>
        <article class="transcript" id="transcript">
          <p>Wähle links eine Folge aus. Verfügbare Transkripte werden hier direkt angezeigt.</p>
        </article>
      </section>
    </main>

    <script src="app.js"></script>
  </body>
</html>
