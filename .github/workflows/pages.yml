name: Deploy landing page

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: github-pages
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Build episode data
        run: |
          python scripts/build_site_manifest.py
          mkdir -p site/transkripte
          find transkripte -maxdepth 1 -type f -name '*.md' -exec cp {} site/transkripte/ \;
          if [ -d transkripte-en ]; then
            mkdir -p site/transkripte-en
            find transkripte-en -maxdepth 1 -type f -name '*.md' -exec cp {} site/transkripte-en/ \;
          fi

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    runs-on: ubuntu-latest
    needs: build
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
