name: Transcribe podcast

on:
  schedule:
    - cron: "0 6 * * 2"
  workflow_dispatch:
    inputs:
      model_size:
        description: Whisper model size
        required: true
        default: small
        type: choice
        options:
          - base
          - small
          - medium
      force:
        description: Recreate existing transcript files
        required: true
        default: false
        type: boolean

permissions:
  contents: write
  actions: read

concurrency:
  group: transcribe-podcast
  cancel-in-progress: false

jobs:
  discover:
    name: Find missing transcripts
    runs-on: ubuntu-latest
    outputs:
      has_work: ${{ steps.plan.outputs.has_work }}
      matrix: ${{ steps.plan.outputs.matrix }}
      model_size: ${{ steps.defaults.outputs.model_size }}
      force: ${{ steps.defaults.outputs.force }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set defaults
        id: defaults
        run: |
          MODEL_SIZE="${{ github.event.inputs.model_size }}"
          FORCE="${{ github.event.inputs.force }}"
          if [ -z "$MODEL_SIZE" ]; then
            MODEL_SIZE="small"
          fi
          if [ -z "$FORCE" ]; then
            FORCE="false"
          fi
          echo "model_size=$MODEL_SIZE" >> "$GITHUB_OUTPUT"
          echo "force=$FORCE" >> "$GITHUB_OUTPUT"

      - name: Build transcript plan
        id: plan
        run: |
          FORCE_ARG=""
          if [ "${{ steps.defaults.outputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          python scripts/plan_transcripts.py \
            --output-dir transkripte \
            --github-output "$GITHUB_OUTPUT" \
            $FORCE_ARG

  transcribe:
    name: Episode ${{ matrix.episode }}
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ needs.discover.outputs.has_work == 'true' }}
    timeout-minutes: 360
    strategy:
      fail-fast: false
      max-parallel: 8
      matrix: ${{ fromJSON(needs.discover.outputs.matrix) }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Cache Whisper models
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-whisper-${{ runner.os }}-${{ needs.discover.outputs.model_size }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt

      - name: Transcribe episode
        run: |
          FORCE_ARG=""
          if [ "${{ needs.discover.outputs.force }}" = "true" ]; then
            FORCE_ARG="--force"
          fi
          python scripts/transcribe_episode.py \
            --episode-index "${{ matrix.episode }}" \
            --model-size "${{ needs.discover.outputs.model_size }}" \
            --device cpu \
            --compute-type int8 \
            $FORCE_ARG

      - name: Upload transcript artifact
        uses: actions/upload-artifact@v4
        with:
          name: transcript-${{ matrix.episode }}
          path: transkripte/*.md
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish markdown files
    runs-on: ubuntu-latest
    needs:
      - discover
      - transcribe
    if: ${{ always() && needs.discover.outputs.has_work == 'true' && needs.transcribe.result == 'success' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download transcript artifacts
        uses: actions/download-artifact@v4
        with:
          path: .downloaded-transcripts
          pattern: transcript-*
          merge-multiple: true

      - name: Commit transcripts
        run: |
          mkdir -p transkripte
          find .downloaded-transcripts -type f -name '*.md' -exec cp {} transkripte/ \;
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add transkripte
          if git diff --cached --quiet; then
            echo "No transcript changes to commit."
          else
            git commit -m "Add podcast transcripts"
            git push
          fi

  no-op:
    name: No new episodes
    runs-on: ubuntu-latest
    needs: discover
    if: ${{ needs.discover.outputs.has_work != 'true' }}

    steps:
      - name: Report
        run: echo "No missing transcripts found."
